name: One-time NHPC proof status update
on:
  push:
    paths:
      - '.github/workflows/nhpc-proof-status-update.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch public NHPC proof status
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text()
          repls = [
              ('"id":"CAMP-002","name":"NHPC Multicity Jun 2026","client":"NHPC","media":"Residential","status":"Closeout due","start":"2026-06-07","end":"2026-06-20","proof":"Needs extraction","invoice":"Pending"', '"id":"CAMP-002","name":"NHPC Multicity Jun 2026","client":"NHPC","media":"Residential","status":"Closeout due","start":"2026-06-07","end":"2026-06-20","proof":"Received","invoice":"Pending"'),
              ('"Close invoice review, attach final proof pack, and mark closeout done."', '"Prepare display report from proof folder; note Mumbai Fressia Ranibello POP exception."'),
              ('"Invoice reminder says campaign ends in 2 days as of 18 Jun."', '"Exact NHPC thread confirmed. Instant proof plus Delhi, Chennai, Lucknow and Mumbai start-date proofs found; Mumbai has Fressia Ranibello POP exception due to payment issue."'),
              ('<h3>8 campaigns with proof folders</h3><p>NBCC, PFRDA Corp, PFRDA WeWork, HUDCO, MCIT, PGCIL, NFDC, and NTPC have proof folders captured. NTPC still needs label verification.</p>', '<h3>9 campaigns with proof folders</h3><p>NBCC, NHPC, PFRDA Corp, PFRDA WeWork, HUDCO, MCIT, PGCIL, NFDC, and NTPC have proof folders captured. NTPC still needs label verification.</p>'),
              ('<h3>NHPC extraction pending</h3><p>NHPC proof emails were found in Gmail snippets, but the full folder URL still needs extraction. Registrar General needs a separate historical proof pass.</p>', '<h3>Registrar historical pass pending</h3><p>NHPC is resolved. Remaining proof cleanup: verify NTPC label mismatch and run a separate historical pass for Registrar General.</p>'),
          ]
          for old, new in repls:
              if old not in s:
                  raise SystemExit('Missing target: ' + old[:120])
              s = s.replace(old, new, 1)
          p.write_text(s)
          Path('.github/workflows/nhpc-proof-status-update.yml').unlink()
          PY
      - name: Commit update
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html .github/workflows/nhpc-proof-status-update.yml
          git commit -m "Resolve NHPC proof status" || exit 0
          git push
